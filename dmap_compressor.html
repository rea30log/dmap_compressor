<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dmap Compressor</title>
<style>
:root{
  --bg:#000;
  --fg:#eee;
  --bd:#555;
  --box:#111;
  --inp:#222;
}
body.light{
  --bg:#f1f1f1;
  --fg:#111;
  --bd:#999;
  --box:#fff;
  --inp:#fff;
}
body{
  margin:0;
  padding:18px;
  font:14px/1.5 Arial,sans-serif;
  background:var(--bg);
  color:var(--fg);
  transition:.2s;
  display:flex;
  flex-direction:column;
  gap:12px;
}
*{box-sizing:border-box}
h2{margin:0;font-size:22px}
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  margin:0;
}
label{white-space:nowrap}
select,input,button,textarea{
  background:var(--inp);
  color:var(--fg);
  border:1px solid var(--bd);
  border-radius:8px;
  padding:10px;
  font:inherit;
}
select,input[type=file],button{width:auto}
button{cursor:pointer;min-width:0}
textarea{
  width:100%;
  height:170px;
  resize:vertical;
  margin:0;
}
input[type=file]{
  width:100%;
  margin:0;
}
.stats,#info,.sel{
  white-space:pre-line;
  background:var(--box);
  border:1px solid var(--bd);
  border-radius:8px;
  padding:10px;
  margin:0;
}
button.inline{width:auto}
.muted{opacity:.8}
</style>
</head>
<body>

<h2 id="title">Dmap Compressor</h2>

<div class="row">
  <label id="lblLang" for="lang">Language</label>
  <select id="lang">
    <option value="jp">Japanese</option>
    <option value="en">English</option>
  </select>

  <select id="mode"></select>
  <select id="style"></select>
  <select id="theme"></select>
</div>

<div class="row">
  <button id="pickReplace" type="button">ファイルを選択</button>
  <button id="pickAdd" type="button">ファイルを追加</button>
  <input id="file" type="file" accept=".txt,text/plain" multiple hidden>
</div>

<div class="sel" id="sel">ファイル未選択</div>

<textarea id="input" placeholder="マップデータを貼り付け"></textarea>

<div class="row">
  <button class="inline" id="run">圧縮</button>
  <button class="inline" id="copyOut">出力をコピー</button>
  <button class="inline" id="copyIn">入力をコピー</button>
</div>

<div class="stats" id="stats">Input: 0
Output: 0
圧縮率: -</div>

<textarea id="output" readonly placeholder="圧縮後データが表示されます"></textarea>

<div class="row">
  <label for="fileNameSet">ファイル名</label>
  <input id="fileNameSet" type="text" placeholder="ダウンロード名を入力">
</div>

<div class="row">
  <button class="inline" id="downloadTxt">txtでダウンロード</button>
  <button class="inline" id="downloadZip">zipでダウンロード</button>
</div>

<div id="info" class="stats muted"></div>

<script>
(() => {
  const U_PREFIX = "M:c:";
  const V_PREFIX = "M:u:";
  const W_PREFIX = "M:w:";
  const COMPRESSED_MARK = "DMAP1|";
  const U14_BASE = 0x4E00;
  const U15_BASE = 0x7FFF;

  const enc = new TextEncoder();
  const dec = new TextDecoder();

  const $ = (id) => document.getElementById(id);
  function stripExt(name) {
    const s = String(name ?? "").trim();
    const i = s.lastIndexOf(".");
    if (i <= 0) return s || "data";
    return s.slice(0, i);
  }

  function sanitizeFileName(name) {
    return String(name ?? "")
      .replace(/[\\\/:*?"<>|]+/g, "_")
      .replace(/\s+/g, " ")
      .trim() || "data";
  }

  function getDownloadBase() {
    const typed = sanitizeFileName($("fileNameSet")?.value ?? "");
    if (typed) return typed;
    if (state.files.length === 1) return sanitizeFileName(stripExt(state.files[0].name));
    if (state.files.length > 1) return sanitizeFileName(stripExt(state.files[0].name) + "_bundle");
    return "data";
  }

  function u32le(n) {
    return new Uint8Array([
      n & 255,
      (n >>> 8) & 255,
      (n >>> 16) & 255,
      (n >>> 24) & 255
    ]);
  }

  function u16le(n) {
    return new Uint8Array([
      n & 255,
      (n >>> 8) & 255
    ]);
  }

  function dosDateTime(date = new Date()) {
    const y = Math.max(1980, date.getFullYear());
    const m = date.getMonth() + 1;
    const d = date.getDate();
    const h = date.getHours();
    const mi = date.getMinutes();
    const s = Math.floor(date.getSeconds() / 2);
    const time = (h << 11) | (mi << 5) | s;
    const day = ((y - 1980) << 9) | (m << 5) | d;
    return { time, day };
  }

  const CRC_TABLE = (() => {
    const table = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let k = 0; k < 8; k++) {
        c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      }
      table[i] = c >>> 0;
    }
    return table;
  })();

  function crc32(u8) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < u8.length; i++) {
      crc = CRC_TABLE[(crc ^ u8[i]) & 255] ^ (crc >>> 8);
    }
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  function buildZipBlob(entries) {
    const enc = new TextEncoder();
    const fileParts = [];
    const centralParts = [];
    let offset = 0;
    const dt = dosDateTime(new Date());

    for (const entry of entries) {
      const nameBytes = enc.encode(entry.name);
      const dataBytes = entry.data instanceof Uint8Array ? entry.data : enc.encode(String(entry.data ?? ""));
      const crc = crc32(dataBytes);

      const localHeader = [
        u32le(0x04034b50),
        u16le(20),
        u16le(0),
        u16le(0),
        u16le(dt.time),
        u16le(dt.day),
        u32le(crc),
        u32le(dataBytes.length),
        u32le(dataBytes.length),
        u16le(nameBytes.length),
        u16le(0),
        nameBytes
      ];
      const localHeaderLen = localHeader.reduce((n, a) => n + a.length, 0);
      fileParts.push(...localHeader, dataBytes);

      const centralHeader = [
        u32le(0x02014b50),
        u16le(20),
        u16le(20),
        u16le(0),
        u16le(0),
        u16le(dt.time),
        u16le(dt.day),
        u32le(crc),
        u32le(dataBytes.length),
        u32le(dataBytes.length),
        u16le(nameBytes.length),
        u16le(0),
        u16le(0),
        u16le(0),
        u16le(0),
        u32le(0),
        u32le(offset),
        nameBytes
      ];
      centralParts.push(...centralHeader);
      offset += localHeaderLen + dataBytes.length;
    }

    const centralSize = centralParts.reduce((n, a) => n + a.length, 0);
    const eocd = [
      u32le(0x06054b50),
      u16le(0),
      u16le(0),
      u16le(entries.length),
      u16le(entries.length),
      u32le(centralSize),
      u32le(offset),
      u16le(0)
    ];

    return new Blob([...fileParts, ...centralParts, ...eocd], { type: "application/zip" });
  }

  function downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 800);
  }


  const state = {
    lang: "jp",
    mode: "c",      // c = compress, d = decompress
    style: "unicode2", // unicode | utf
    theme: "dark",  // dark | light
    files: [],
    multiRates: [],
    multiOutputs: [],
    multiInputs: [],
    multiLengths: [],
    statsReady: true,
  };

  const T = {
    jp: {
      compress: "圧縮",
      decompress: "展開",
      copyIn: "入力をコピー",
      copyOut: "出力をコピー",
      downloadTxt: "ダウンロード：txt",
      downloadZip: "ダウンロード：zip",
      inputPH: "ここにdmapを直接貼り付けても使えます",
      outputPHCompress: "圧縮後データが表示されます",
      outputPHDecompress: "展開後データが表示されます",
      noFile: "ファイル未選択",
      multi: "複数選択中",
      input: "入力",
      output: "出力",
      rateC: "圧縮率",
      rateD: "展開率",
      noInput: "マップデータがありません",
      notComp: "展開データではありません",
      already: "すでに圧縮済みです",
      noAPI: "このブラウザは CompressionStream / DecompressionStream に対応していません",
      doneC: "圧縮完了",
      doneD: "展開完了",
      fail: "失敗",
      copiedIn: "入力をクリップボードにコピーしました",
      copiedOut: "出力をクリップボードにコピーしました",
      chooseCopy: "どのデータをクリップボードに貼り付けますか？\n番号を入力してください。",
      fileOne: "件",
      files: "ファイル",
      themeDark: "ダーク",
      themeLight: "ライト",
      fileName: "ファイル名",
      fileNamePH: "ダウンロード名を入力",
    },
    en: {
      compress: "Compress",
      decompress: "Decompress",
      copyIn: "Copy Input",
      copyOut: "Copy Output",
      downloadTxt: "Download : txt",
      downloadZip: "Download : zip",
      inputPH: "Paste map data here",
      outputPHCompress: "Compressed data will appear here",
      outputPHDecompress: "Decompressed data will appear here",
      noFile: "No file selected",
      multi: "Multiple selected",
      input: "Input",
      output: "Output",
      rateC: "Compression rate",
      rateD: "Expansion rate",
      noInput: "No map data",
      notComp: "Not decompressed data",
      already: "Already compressed",
      noAPI: "This browser does not support CompressionStream / DecompressionStream",
      doneC: "Compression complete",
      doneD: "Decompression complete",
      fail: "Failed",
      copiedIn: "Input copied to clipboard",
      copiedOut: "Output copied to clipboard",
      chooseCopy: "Which data should be copied to the clipboard?\nEnter the number.",
      fileOne: "file",
      files: "files",
      themeDark: "Dark",
      themeLight: "Light",
      fileName: "File name",
      fileNamePH: "Enter download name",
    }
  };

  function tr() {
    return T[state.lang];
  }

  function normalizeHead(text) {
    let s = String(text ?? "").replace(/^\uFEFF/, "").trimStart();
    if (!s) return s;

    const lines = s.split(/\r?\n/);
    while (lines.length && /^\[[^\]]+\]$/.test(lines[0].trim())) {
      lines.shift();
      while (lines.length && lines[0].trim() === "") lines.shift();
    }
    return lines.join("\n").trimStart();
  }

  function detectModeFromText(text) {
    const s = normalizeHead(text);
    if (!s) return state.mode;
    if (s.startsWith(COMPRESSED_MARK)) return "d";
    if (s.startsWith(U_PREFIX) || s.startsWith(V_PREFIX) || s.startsWith(W_PREFIX)) return "d";
    return "c";
  }

  function syncModeFromText(text) {
    const next = detectModeFromText(text);
    if (next !== state.mode) {
      state.mode = next;
      return true;
    }
    return false;
  }

  function parsePayload(text) {
    const s = normalizeHead(text);
    if (!s) return { kind: "", body: "" };

    if (s.startsWith(COMPRESSED_MARK)) {
      const rest = s.slice(COMPRESSED_MARK.length);
      const kind = rest.charAt(0);
      if (rest.charAt(1) !== "|") return { kind: "", body: "" };
      return { kind, body: rest.slice(2) };
    }

    if (s.startsWith(U_PREFIX)) return { kind: "c", body: s.slice(U_PREFIX.length) };
    if (s.startsWith(V_PREFIX)) return { kind: "u", body: s.slice(V_PREFIX.length) };
    if (s.startsWith(W_PREFIX)) return { kind: "w", body: s.slice(W_PREFIX.length) };
    return { kind: "", body: s };
  }

  function setTheme(theme) {
    state.theme = theme;
    document.body.classList.toggle("light", theme === "light");
    $("theme").value = theme;
  }

  function setMode(mode) {
    state.mode = mode;
    state.multiRates = [];
    state.multiOutputs = [];
    state.multiInputs = [];
    state.multiLengths = [];
    state.statsReady = false;
    $("mode").value = mode;
    renderAll();
  }

  function setLang(lang) {
    state.lang = lang;
    $("lang").value = lang;
    renderAll();
  }

  function buildSelects() {
    const t = tr();

    $("mode").innerHTML =
      `<option value="c">${t.compress}</option>` +
      `<option value="d">${t.decompress}</option>`;

    $("style").innerHTML =
      `<option value="unicode2">Unicode1</option>` +
      `<option value="unicode">Unicode2(stable)</option>` +
      `<option value="utf">UTF</option>`;

    $("theme").innerHTML =
      `<option value="dark">${t.themeDark}</option>` +
      `<option value="light">${t.themeLight}</option>`;

    $("mode").value = state.mode;
    $("style").value = state.style;
    $("theme").value = state.theme;
    $("lang").value = state.lang;
  }

  function updateText() {
    const t = tr();

    $("title").textContent = "Dmap Compressor v2.3.5";
    $("lblLang").textContent = "Language";
    const fileLabel = $("fileNameSet")?.previousElementSibling;
    if (fileLabel && fileLabel.tagName === "LABEL") fileLabel.textContent = t.fileName;
    if ($("fileNameSet")) $("fileNameSet").placeholder = t.fileNamePH;

    $("run").textContent = state.mode === "c" ? t.compress : t.decompress;
    $("copyIn").textContent = t.copyIn;
    $("copyOut").textContent = t.copyOut;
    $("downloadTxt").textContent = t.downloadTxt;
    $("downloadZip").textContent = t.downloadZip;

    $("input").placeholder = t.inputPH;
    $("output").placeholder = state.mode === "c" ? t.outputPHCompress : t.outputPHDecompress;
  }

  function updateSelectionView() {
    const t = tr();
    const fileNameSet = $("fileNameSet");

    if (!state.files.length) {
      $("sel").textContent = t.noFile;
      if (fileNameSet && !String(fileNameSet.value || "").trim()) fileNameSet.value = "data";
      return;
    }
    if (state.files.length === 1) {
      $("sel").textContent = state.files[0].name;
      if (fileNameSet) fileNameSet.value = sanitizeFileName(stripExt(state.files[0].name));
      return;
    }
    $("sel").textContent = `${t.multi} (${state.files.length})
` + state.files.map(f => f.name).join("\n");
    if (fileNameSet) fileNameSet.value = sanitizeFileName(stripExt(state.files[0].name) + "_bundle");
  }

  function updateStats() {
    const t = tr();

    if (state.multiRates.length) {
      const label = state.mode === "c" ? t.rateC : t.rateD;
      $("stats").textContent = state.multiRates.map((x, i) => {
        const inp = state.multiInputs?.[i] ?? 0;
        const out = state.multiLengths?.[i] ?? 0;
        return `${t.input}[${i + 1}]: ${inp}\n${t.output}[${i + 1}]: ${out}\n${label}[${i + 1}]: ${x}`;
      }).join("\n\n");
      return;
    }

    const a = $("input").value.trim().length;
    const b = $("output").value.trim().length;
    const rate = state.statsReady && a
      ? ((state.mode === "c" ? (1 - b / a) : (b / a)) * 100).toFixed(2) + "%"
      : "-";

    $("stats").textContent = `${t.input}: ${a}\n${t.output}: ${b}\n${state.mode === "c" ? t.rateC : t.rateD}: ${rate}`;
  }

  function log(msg) {
    $("info").textContent = msg + "\n\n" + $("info").textContent;
  }

  function rate(a, b, mode) {
    return a ? ((mode === "c" ? (1 - b / a) : (b / a)) * 100).toFixed(2) + "%" : "-";
  }

  function b64e(u8) {
    let s = "";
    for (let i = 0; i < u8.length; i += 0x8000) {
      s += String.fromCharCode(...u8.subarray(i, i + 0x8000));
    }
    return btoa(s);
  }

  function b64d(s) {
    const bin = atob(s);
    const u8 = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    return u8;
  }

  function u14e(u8) {
    let out = "";
    let bits = 0;
    let n = 0;

    for (const x of u8) {
      bits |= x << n;
      n += 8;
      while (n >= 14) {
        out += String.fromCharCode(U14_BASE + (bits & 0x3fff));
        bits >>= 14;
        n -= 14;
      }
    }
    if (n) out += String.fromCharCode(U14_BASE + bits);
    return out;
  }

  function u14d(s) {
    const out = [];
    let bits = 0;
    let n = 0;

    for (const c of s) {
      if (/\s/.test(c)) continue;
      const x = c.charCodeAt(0) - U14_BASE;
      if (x < 0 || x >= 16384) continue;
      bits |= x << n;
      n += 14;
      while (n >= 8) {
        out.push(bits & 255);
        bits >>= 8;
        n -= 8;
      }
    }
    return new Uint8Array(out);
  }

    const U15_LOW_BASE = 0x3400;
    const U15_HIGH_BASE = 0xAC00;
    
    function u15e(u8) {
      let out = "";
      let bits = 0;
      let n = 0;
    
      for (const x of u8) {
        bits |= x << n;
        n += 8;
    
        while (n >= 15) {
          let v = bits & 0x7FFF;
    
          out += String.fromCharCode(
            v < 0x5800
              ? U15_LOW_BASE + v
              : U15_HIGH_BASE + (v - 0x5800)
          );
    
          bits >>= 15;
          n -= 15;
        }
      }
    
      if (n) {
        let v = bits;
    
        out += String.fromCharCode(
          v < 0x5800
            ? U15_LOW_BASE + v
            : U15_HIGH_BASE + (v - 0x5800)
        );
      }
    
      return out;
    }

    function u15d(s) {
      const out = [];
      let bits = 0;
      let n = 0;
    
      for (const c of s) {
        const cc = c.charCodeAt(0);
    
        let v = -1;
    
        if (
          cc >= U15_LOW_BASE &&
          cc < U15_LOW_BASE + 0x5800
        ) {
          v = cc - U15_LOW_BASE;
        }
        else if (
          cc >= U15_HIGH_BASE &&
          cc < U15_HIGH_BASE + (0x8000 - 0x5800)
        ) {
          v = (cc - U15_HIGH_BASE) + 0x5800;
        }
    
        if (v < 0) continue;
    
        bits |= v << n;
        n += 15;
    
        while (n >= 8) {
          out.push(bits & 255);
          bits >>= 8;
          n -= 8;
        }
      }
    
      return new Uint8Array(out);
    }

    function downloadBlob(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = name;
      a.style.display = "none";

      document.body.appendChild(a);

      requestAnimationFrame(() => {
        a.click();

        setTimeout(() => {
          URL.revokeObjectURL(url);
          a.remove();
        }, 5000);
      });
    }

    function dl(name, text) {
      downloadBlob(
        new Blob([text], {
          type:"text/plain;charset=utf-8"
        }),
        name
      );
    }

  async function readFile(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(String(fr.result ?? ""));
      fr.onerror = () => reject(new Error(tr().fail));
      fr.readAsText(file, "UTF-8");
    });
  }

  async function compressText(src) {
    const t = tr();
    if (!window.CompressionStream) throw new Error(t.noAPI);

    src = src.trim();
    if (!src) throw new Error(t.noInput);
    if (src.startsWith(U_PREFIX) || src.startsWith(V_PREFIX) || src.startsWith(W_PREFIX)) throw new Error(t.already);

    const ab = await new Response(
      new Blob([enc.encode(src)]).stream().pipeThrough(new CompressionStream("deflate-raw"))
    ).arrayBuffer();

    const u8 = new Uint8Array(ab);
    const header = u8.length.toString(36) + ":";

    return state.style === "utf"
      ? V_PREFIX + header + b64e(u8)
      : state.style === "unicode2"
      ? W_PREFIX + header + u15e(u8)
      : U_PREFIX + header + u14e(u8);
  }

  async function decompressText(src) {
    const t = tr();
    if (!window.DecompressionStream) throw new Error(t.noAPI);

    const payload = parsePayload(src);
    if (!payload.kind) throw new Error(t.notComp);

    const isUnicode = payload.kind === "c";
    const isUtf = payload.kind === "u";
    const isUnicode2 = payload.kind === "w";
    let body = String(payload.body ?? "").trim();
    const i = body.indexOf(":");
    if (i < 0) throw new Error("Invalid format");

    const n = parseInt(body.slice(0, i), 36);
    let u8 = isUnicode ? u14d(body.slice(i + 1))
      : isUnicode2 ? u15d(body.slice(i + 1))
      : b64d(body.slice(i + 1));
    if (u8.length > n) u8 = u8.subarray(0, n);

    const ab = await new Response(
      new Blob([u8]).stream().pipeThrough(new DecompressionStream("deflate-raw"))
    ).arrayBuffer();

    return dec.decode(ab);
  }

  function renderAll() {
    buildSelects();
    updateText();
    updateSelectionView();
    updateStats();
  }

  async function run() {
    const t = tr();
    try {
      if (state.files.length > 1) {
        const outs = [];
        const rates = [];
        const inputs = [];
        const lengths = [];
        for (const f of state.files) {
          const src = await readFile(f);
          const srcForMode = state.mode === "d" ? normalizeHead(src) : src;
          const out = state.mode === "c" ? await compressText(srcForMode) : await decompressText(srcForMode);
          const a = srcForMode.trim().length;
          const b = out.trim().length;
          outs.push({ name: f.name, out });
          inputs.push(a);
          lengths.push(b);
          rates.push(rate(a, b, state.mode));
        }
        state.multiOutputs = outs;
        state.multiInputs = inputs;
        state.multiLengths = lengths;
        $("output").value = outs.map(v => `[${v.name}]\n${v.out}`).join("\n\n");
        state.multiRates = rates;
        state.statsReady = true;
        log((state.mode === "c" ? t.doneC : t.doneD) + ` (${state.files.length} ${t.files})`);
      } else {
        const src = state.files.length === 1 ? await readFile(state.files[0]) : $("input").value;
        const srcForMode = state.mode === "d" ? normalizeHead(src) : src;
        const out = state.mode === "c" ? await compressText(srcForMode) : await decompressText(srcForMode);
        $("output").value = out;
        state.multiRates = [];
        state.multiOutputs = [];
        state.multiInputs = [];
        state.multiLengths = [];
        state.statsReady = true;
        log(state.mode === "c" ? t.doneC : t.doneD);
      }
      updateStats();
    } catch (e) {
      alert(t.fail + ": " + (e?.message || String(e)));
    }
  }

  function downloadCurrentTxt() {
    const base = getDownloadBase();
    const suffix = state.mode === "c" ? "_compressed" : "_decompressed";

    if (state.files.length > 1 && state.multiOutputs.length > 1) {
      for (const item of state.multiOutputs) {
        dl(sanitizeFileName(stripExt(item.name)) + suffix + ".txt", item.out);
      }
      return;
    }

    dl(base + suffix + ".txt", $("output").value);
  }

  function downloadCurrentZip() {
    const suffix = state.mode === "c" ? "_compressed" : "_decompressed";

    if (state.files.length > 1 && state.multiOutputs.length > 1) {
      const entries = state.multiOutputs.map(item => ({
        name: sanitizeFileName(stripExt(item.name)) + suffix + ".txt",
        data: item.out
      }));
      downloadBlob(buildZipBlob(entries), getDownloadBase() + ".zip");
      return;
    }

    const singleName = (state.files.length === 1 ? sanitizeFileName(stripExt(state.files[0].name)) : getDownloadBase()) + suffix + ".txt";
    downloadBlob(buildZipBlob([{ name: singleName, data: $("output").value }]), getDownloadBase() + ".zip");
  }

  $("lang").addEventListener("change", (e) => setLang(e.target.value));
  $("mode").addEventListener("change", (e) => {
    state.mode = e.target.value;
    state.multiRates = [];
    state.multiOutputs = [];
    state.multiInputs = [];
    state.multiLengths = [];
    state.statsReady = false;
    renderAll();
  });
  $("style").addEventListener("change", (e) => {
    state.style = e.target.value;
    $("style").value = state.style;
    updateText();
  });
  $("theme").addEventListener("change", (e) => setTheme(e.target.value));

let addMode = false;

function mergeFiles(oldFiles, newFiles) {
  const map = new Map();

  for (const f of [...oldFiles, ...newFiles]) {
    map.set(
      `${f.name}_${f.size}_${f.lastModified}`,
      f
    );
  }

  return [...map.values()];
}

async function updateFileView() {
  state.multiRates = [];
  state.multiOutputs = [];
  state.multiInputs = [];
  state.multiLengths = [];
  state.statsReady = false;

  $("input").value = "";
  $("output").value = "";

  updateSelectionView();
  updateStats();

  try {
    if (state.files.length === 1) {
      const text = await readFile(state.files[0]);

      $("input").value =
        `[${state.files[0].name}]\n` + text;

      syncModeFromText(text);
    }
    else if (state.files.length > 1) {
      const texts = await Promise.all(
        state.files.map(readFile)
      );

      $("input").value = texts.map(
        (t,i)=>`[${state.files[i].name}]\n${t}`
      ).join("\n\n");

      const modes = texts.map(detectModeFromText);
      const d = modes.filter(v => v === "d").length;
      const c = modes.filter(v => v === "c").length;

      state.mode =
        d !== c
        ? (d > c ? "d" : "c")
        : (modes[0] || state.mode);
    }
  }
  catch (e) {
    console.warn(e);
  }

  renderAll();
}

$("pickReplace").addEventListener("click", () => {
  addMode = false;
  $("file").click();
});

$("pickAdd").addEventListener("click", () => {
  addMode = true;
  $("file").click();
});

$("file").addEventListener("change", async function () {
  const picked = [...this.files];

  if (addMode) {
    state.files = mergeFiles(
      state.files,
      picked
    );
  }
  else {
    state.files = picked;
  }

  this.value = "";
  await updateFileView();
});

  $("input").addEventListener("input", () => {
    state.files = [];
    state.multiRates = [];
    state.multiOutputs = [];
    $("output").value = "";
    state.statsReady = true;
    updateSelectionView();
    syncModeFromText($("input").value);
    renderAll();
  });

  $("run").addEventListener("click", run);
  $("copyIn").addEventListener("click", () =>
    navigator.clipboard.writeText($("input").value).then(() => log(tr().copiedIn)).catch(() => alert(tr().fail))
  );
  $("copyOut").addEventListener("click", async () => {
    try {
      if (state.multiOutputs.length > 1) {
        const list = state.multiOutputs.map((v, i) => `${i + 1}: ${v.name}`).join("\n");
        const choice = prompt(tr().chooseCopy + "\n\n" + list, "1");
        if (choice === null) return;
        const idx = Number(choice);
        if (!Number.isInteger(idx) || idx < 1 || idx > state.multiOutputs.length) {
          alert(tr().fail + ": invalid selection");
          return;
        }
        await navigator.clipboard.writeText(state.multiOutputs[idx - 1].out);
        log(tr().copiedOut + ` (${state.multiOutputs[idx - 1].name})`);
      } else {
        await navigator.clipboard.writeText($("output").value);
        log(tr().copiedOut);
      }
    } catch (e) {
      alert(tr().fail + ": " + (e?.message || String(e)));
    }
  });
  $("downloadTxt").addEventListener("click", downloadCurrentTxt);
  $("downloadZip").addEventListener("click", downloadCurrentZip);

  // Initial state
  setTheme(state.theme);
  if ($("fileNameSet")) $("fileNameSet").value = "data";
  renderAll();
})();
</script>
</body>
</html>
